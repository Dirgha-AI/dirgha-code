name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (${{ matrix.os }} · Node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: ['20', '22']
        # Avoid quadratic explosion: full coverage on Linux, smoke on
        # macOS+Windows. Keeps CI green-time under 10 min while still
        # catching cross-OS path/EOL bugs.
        exclude:
          - { os: macos-latest,   node: '20' }
          - { os: windows-latest, node: '20' }

    steps:
      - name: Check out
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node ${{ matrix.node }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install
        run: npm ci --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: License audit
        run: npm run license-check

      - name: CVE audit (npm audit, fail on high+)
        # CI-5: blocks merge on a known high/critical CVE in production
        # deps. Dev-deps (vitest, eslint) are excluded — they don't
        # ship in the tarball.
        run: npm audit --audit-level=high --omit=dev

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Smoke-test bundle (cross-OS)
        # Confirms the built CLI loads + reports its own version on every
        # OS × Node combination. Regressions like "fs.realpath case sensitivity
        # broke Windows" surface here, before they reach a tag push.
        run: |
          node dist/cli/main.js --version
          node dist/cli/main.js --help

      - name: Headless Ink unit tests (release-blocking)
        # CI-2: ink_unit_test mounts App into a fake stdout buffer and
        # drives /help, /theme, /models slash overlays via FakeStdin. No
        # tmux, no Chrome, no real TTY — runs identically on Linux,
        # macOS, and Windows.
        run: npm run test:cli:offline

      - name: Doctor (cross-OS)
        # `dirgha doctor` exercises the env-detection codepaths on each OS.
        # It must exit 0 even with no creds — it's diagnostic, not auth-gated.
        run: node dist/cli/main.js doctor
        continue-on-error: true
