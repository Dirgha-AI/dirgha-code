name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint (tsc --noEmit)
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build (public)
        run: npm run build:public

      - name: Smoke-test bundle
        run: |
          node dist/dirgha.mjs --version
          node dist/dirgha.mjs --help > /dev/null

      - name: Verify default help has no experimental commands
        run: |
          node dist/dirgha.mjs --help \
            | grep -E '^  (dao|make|mesh|bucky|swarm|join-mesh|voice|voice-config)' \
            && (echo "Experimental command leaked into default --help" && exit 1) \
            || echo "ok — default --help has no experimental commands"
