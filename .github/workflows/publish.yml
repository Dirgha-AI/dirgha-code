name: Publish to npm

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. v1.13.0)'
        required: true

permissions:
  id-token: write   # OIDC for npm trusted publisher + cosign keyless
  contents: write   # create/update the GitHub Release (attach SBOM, .sig, .pem)

jobs:
  publish:
    name: npm publish
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Verify tag matches package.json version
        run: |
          PKG_VER=$(node -p "require('./package.json').version")
          TAG_VER=${GITHUB_REF#refs/tags/v}
          if [ "$PKG_VER" != "$TAG_VER" ]; then
            echo "package.json version ($PKG_VER) does not match git tag ($TAG_VER)" >&2
            exit 1
          fi

      - name: Install
        run: npm ci --no-audit --no-fund

      - name: Prepublish guard
        run: npm run prepublish-guard

      - name: Lint
        run: npm run lint

      - name: License audit
        run: npm run license-check

      - name: CVE audit (npm audit, fail on high+)
        run: npm audit --audit-level=high --omit=dev

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify install
        run: npm run verify-install

      # CI gate: install the just-built tarball globally and run the
      # non-interactive smoke surface. Interactive Ink + tmux smoke
      # (scripts/smoke-matrix.sh all) is a developer pre-tag check —
      # GH Actions runners don't reliably render Ink in tmux's pty,
      # so we keep tmux smoke local and gate CI on what works.
      - name: Install just-built CLI globally
        run: |
          npm pack
          npm install -g --force ./dirgha-code-*.tgz
          dirgha --version

      - name: Non-interactive subcommand smoke
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          set -e
          dirgha --version
          dirgha --help | grep -q 'update \[--check\] \[--yes\]'
          dirgha doctor | grep -qE 'node|provider|API|env'
          dirgha update --check | grep -qE '@dirgha/code|up to date|newer available'
          # Tool-call round trip — confirms shell tool dispatches and the
          # provider chain works in CI. Skip when no API key.
          if [ -n "${OPENROUTER_API_KEY:-}" ]; then
            DIRGHA_MODEL=tencent/hy3-preview:free DIRGHA_PROVIDER=openrouter \
              dirgha ask --max-turns 3 --print 'use the shell tool to run echo TOOL_OK and report the exact output' \
              | grep -q TOOL_OK
          else
            echo "OPENROUTER_API_KEY not set — tool-call cell skipped (warn-only)."
          fi
          echo "All non-interactive smoke cells PASS."

      - name: Headless Ink unit tests + slash audit + tools smoke (release-blocking)
        # CI-2 sprint: replaces the tmux+freeze interactive smoke that
        # couldn't run in GH Actions runners. ink_unit_test.mjs mounts
        # the App component into a fake stdout buffer (no real TTY) and
        # drives /help, /theme, /models slash overlays via FakeStdin
        # 'readable' events. slash_audit covers every registered slash
        # command. tokrate covers the StatusBar tok/s computation.
        # 40 cells / 0 failures locally on 1.7.9.
        run: npm run test:cli:offline

      - name: Install tmux + TERM for ux-scorer journey recording
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y tmux

      - name: Multi-agent UX scorer (release-blocking, threshold ≥ 7)
        # CI-3 sprint: spawns N judge LLMs against the installed dirgha
        # binary, records 5 scripted journeys via tmux, asks each judge
        # to score against the rubric (tools/ux-scorer/rubric.md). Median
        # across journeys × judges must be ≥ 7.0. Default fleet is the
        # `ling-2.6-1t:free` judge — free, reliable JSON output.
        # NVIDIA_API_KEY and GROQ_API_KEY auto-add deepseek-v4 / kimi-k2
        # judges to the fleet. Missing all keys → run records but skips
        # scoring (gate auto-passes for forks without secrets).
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TERM: xterm-256color
        run: |
          # Seed ~/.dirgha so the wizard skips inside the recorded sessions.
          bash tools/vhs/seed-home.sh
          node tools/ux-scorer/run.mjs --threshold=7.0

      - name: Upload ux-scorer artefacts (transcripts + report)
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ux-scorer-${{ github.ref_name }}
          path: /tmp/dirgha-ux-*/
          retention-days: 14
          if-no-files-found: ignore

      - name: Bundle size budget (CI-5)
        # Allow 600 KB tarball; current 1.7.12 is ~454 KB. Growth above
        # 600 KB requires a justification line in the release marker.
        # Hard cap: bundle-size regression should be a deliberate decision.
        run: |
          npm pack --dry-run 2>/dev/null
          npm pack >/dev/null
          BYTES=$(stat -c%s dirgha-code-*.tgz)
          BUDGET=614400  # 600 KB
          echo "Tarball size: $BYTES bytes (budget: $BUDGET)"
          if [ "$BYTES" -gt "$BUDGET" ]; then
            echo "::error::Bundle size $BYTES exceeds budget $BUDGET — bump deliberately"
            exit 1
          fi

      - name: Generate SBOM (CycloneDX + SPDX)
        # CI-5: emits both formats so downstream consumers (Anchore,
        # Snyk, Dependency-Track for CycloneDX; tooling for SPDX) all
        # work without us having to pick a side. npm 11.5.1 has both
        # built-in. Production deps only — dev-deps don't ship.
        run: |
          npx -y npm@11.5.1 sbom --sbom-format=cyclonedx --omit=dev > sbom.cdx.json
          npx -y npm@11.5.1 sbom --sbom-format=spdx --omit=dev > sbom.spdx.json
          echo "CycloneDX SBOM: $(wc -c < sbom.cdx.json) bytes"
          echo "SPDX SBOM:      $(wc -c < sbom.spdx.json) bytes"

      - name: Install cosign
        # Keyless OIDC signing — uses the same GitHub OIDC token that
        # npm provenance uses. No private key to manage.
        uses: sigstore/cosign-installer@7e8b541eb2e61bf99390e1afd4be13a184e9ebc5 # v3.10.1

      - name: Sign SBOMs with cosign (keyless OIDC)
        # Creates sbom.cdx.json.sig, sbom.spdx.json.sig + .pem cert files.
        # Verifiable via `cosign verify-blob --cert <cert> --signature <sig> <file>`
        env:
          COSIGN_EXPERIMENTAL: 1
        run: |
          cosign sign-blob --yes \
            --output-signature sbom.cdx.json.sig \
            --output-certificate sbom.cdx.json.pem \
            sbom.cdx.json
          cosign sign-blob --yes \
            --output-signature sbom.spdx.json.sig \
            --output-certificate sbom.spdx.json.pem \
            sbom.spdx.json
          echo "Signed SBOMs:"
          ls -la sbom.*.{sig,pem} 2>/dev/null || true

      # Publish with a pinned npm CLI ≥ 11.5.1 — required for Trusted
      # Publisher OIDC auth. Node 22 ships npm 10.x; rather than break
      # the bundled npm via `npm install -g npm@latest` (which has a
      # known issue where the install pulls a broken tarball missing
      # promise-retry), shell out via npx for the publish step only.
      # No NODE_AUTH_TOKEN — the OIDC id-token authenticates the session.
      - name: Publish (via pinned npm 11)
        run: npx -y npm@11.5.1 publish --access public --provenance

      - name: Attach tarball + SBOMs + signatures to GitHub Release (CI-5)
        # Release notes auto-populate from the commit body; SBOM files
        # and their cosign signatures are downloadable evidence for
        # security auditors. The .pem certs allow offline verification.
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: |
            dirgha-code-*.tgz
            sbom.cdx.json
            sbom.spdx.json
            sbom.cdx.json.sig
            sbom.spdx.json.sig
            sbom.cdx.json.pem
            sbom.spdx.json.pem
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
