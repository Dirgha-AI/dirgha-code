name: Publish to npm

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    name: npm publish
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      # Trusted Publisher (OIDC) requires npm CLI ≥ 11.5.1. Node 22 ships
      # npm 10.x; pin to a known-good version that supports OIDC auth.
      - name: Pin npm CLI ≥ 11.5.1 (for trusted publisher OIDC)
        run: npm install -g npm@latest

      - name: Verify tag matches package.json version
        run: |
          PKG_VER=$(node -p "require('./package.json').version")
          TAG_VER=${GITHUB_REF#refs/tags/v}
          if [ "$PKG_VER" != "$TAG_VER" ]; then
            echo "package.json version ($PKG_VER) does not match git tag ($TAG_VER)" >&2
            exit 1
          fi

      - name: Install
        run: npm ci --no-audit --no-fund

      - name: Prepublish guard
        run: npm run prepublish-guard

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify install
        run: npm run verify-install

      # No NODE_AUTH_TOKEN — Trusted Publisher (OIDC) authenticates via
      # the workflow's id-token. Setting an empty NPM_TOKEN secret would
      # leave .npmrc with `_authToken=` and confuse the OIDC handshake.
      - name: Publish
        run: npm publish --access public --provenance
