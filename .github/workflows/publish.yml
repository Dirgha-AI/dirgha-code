name: Publish to npm

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    name: npm publish
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Verify tag matches package.json version
        run: |
          PKG_VER=$(node -p "require('./package.json').version")
          TAG_VER=${GITHUB_REF#refs/tags/v}
          if [ "$PKG_VER" != "$TAG_VER" ]; then
            echo "package.json version ($PKG_VER) does not match git tag ($TAG_VER)" >&2
            exit 1
          fi

      - name: Install
        run: npm ci --no-audit --no-fund

      - name: Prepublish guard
        run: npm run prepublish-guard

      - name: Lint
        run: npm run lint

      - name: License audit
        run: npm run license-check

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify install
        run: npm run verify-install

      # Smoke matrix tier=all is a release-blocking gate as of CI-1 sprint.
      # Drives every slash command + non-interactive subcommand against the
      # JUST-BUILT dist_v2 bundle through tmux + freeze + a real tool-call
      # round-trip. /theme regression in v1.7.8 motivated promoting this
      # to a tag-push gate; tier1 alone missed that bug.
      - name: Install tmux + freeze for smoke matrix
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y tmux
          # charmbracelet/freeze official tarball — pinned to a known-good
          # release so the smoke matrix is reproducible across CI runs.
          FREEZE_VER="0.2.1"
          curl -sSL "https://github.com/charmbracelet/freeze/releases/download/v${FREEZE_VER}/freeze_${FREEZE_VER}_Linux_x86_64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin --strip-components=1 freeze_${FREEZE_VER}_Linux_x86_64/freeze

      - name: Install just-built CLI globally
        # Smoke matrix drives the INSTALLED `dirgha` binary, not
        # `node dist_v2/...` — proves the publish artefact actually works
        # end-to-end before we let the publish step run.
        run: |
          npm pack
          npm install -g --force ./dirgha-code-*.tgz
          dirgha --version

      - name: Seed ~/.dirgha so the first-run wizard skips
        # Without this, dirgha sees an empty ~/.dirgha and launches the
        # interactive setup wizard on every smoke-matrix tmux session,
        # which never reaches the slash-command surface — every cell
        # FAILs identically. Seeding a minimal config + keys file with
        # the OPENROUTER key tells the CLI it's already set up.
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          mkdir -p "$HOME/.dirgha"
          cat > "$HOME/.dirgha/config.json" <<'JSON'
          {
            "version": "1.0.0",
            "project": { "name": "ci", "root": "$HOME", "type": "node" },
            "context": { "files": [] }
          }
          JSON
          if [ -n "${OPENROUTER_API_KEY:-}" ]; then
            python3 -c "import json,os; json.dump({'OPENROUTER_API_KEY': os.environ['OPENROUTER_API_KEY']}, open(os.path.expanduser('~/.dirgha/keys.json'), 'w'))"
          else
            # Stub keys.json so isFirstRun returns false even without the secret.
            echo '{}' > "$HOME/.dirgha/keys.json"
          fi
          ls -la "$HOME/.dirgha/"

      - name: Diagnostic — confirm CLI + env before smoke
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          # tmux refuses to start a server without TERM. GH Actions runners
          # don't set one by default ("dumb" or unset). Pin a real terminal.
          TERM: xterm-256color
        run: |
          echo "=== TERM ==="
          echo "TERM=$TERM"
          echo "=== which dirgha ==="
          which dirgha || true
          echo "=== dirgha --version ==="
          dirgha --version
          echo "=== ~/.dirgha ==="
          ls -la "$HOME/.dirgha"
          echo "=== OPENROUTER_API_KEY length ==="
          echo "${#OPENROUTER_API_KEY} chars"
          echo "=== tmux: spawn dirgha REPL, send /help, capture ==="
          tmux new-session -d -s diag -x 120 -y 32 "dirgha"
          sleep 3
          tmux send-keys -t diag -l "/help"
          sleep 1
          tmux send-keys -t diag "Enter"
          sleep 4
          tmux capture-pane -t diag -p | head -32
          tmux kill-session -t diag || true
          echo "=== freeze version ==="
          freeze --version || true

      - name: Smoke matrix (tier=all, release-blocking)
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          TERM: xterm-256color
        run: |
          # Smoke matrix drives /theme, /update, /help, /init, /keys, /models,
          # /clear, /login, /setup, /status, /memory, /compact, plus the
          # non-interactive subcommands and one shell-tool round-trip.
          if [ -z "${OPENROUTER_API_KEY:-}" ]; then
            echo "OPENROUTER_API_KEY secret not set — tool-call cell will FAIL." >&2
            echo "Add it under Settings → Secrets → Actions to fully gate this step." >&2
          fi
          bash scripts/smoke-matrix.sh all || true
          if grep -q "FAIL" /tmp/dirgha-smoke-*/REPORT.md; then
            echo "::error::Smoke matrix has FAIL cells — refusing to publish."
            cat /tmp/dirgha-smoke-*/REPORT.md
            # Keep the artefacts step still runnable
            mkdir -p /tmp/smoke-artefacts
            cp -r /tmp/dirgha-smoke-* /tmp/smoke-artefacts/ 2>/dev/null || true
            exit 1
          fi
          echo "Smoke matrix tier=all: all cells PASS."

      - name: Upload smoke artefacts (frames + body texts) on any outcome
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-matrix-artefacts
          path: /tmp/dirgha-smoke-*/
          retention-days: 7
          if-no-files-found: ignore

      # Publish with a pinned npm CLI ≥ 11.5.1 — required for Trusted
      # Publisher OIDC auth. Node 22 ships npm 10.x; rather than break
      # the bundled npm via `npm install -g npm@latest` (which has a
      # known issue where the install pulls a broken tarball missing
      # promise-retry), shell out via npx for the publish step only.
      # No NODE_AUTH_TOKEN — the OIDC id-token authenticates the session.
      - name: Publish (via pinned npm 11)
        run: npx -y npm@11.5.1 publish --access public --provenance
