# OpenSSF Scorecard — automated supply-chain hygiene audit.
# Runs weekly + on push to main + on branch protection changes.
# Public score visible at https://scorecard.dev/viewer/?uri=github.com/Dirgha-AI/dirgha-code
# CI-5 sprint, 2026-04-28.

name: OpenSSF Scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: '0 6 * * 1'  # Monday 06:00 UTC = 11:30 IST
  push:
    branches: [main]

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read

    steps:
      - name: Check out
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload artefact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: scorecard-sarif
          path: results.sarif
          retention-days: 5

      - name: Upload to GitHub Security (Code Scanning)
        uses: github/codeql-action/upload-sarif@ce64ddcb0d8d890d2df4a9d1c04ff297367dea2a # v3.35.2
        with:
          sarif_file: results.sarif
