<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 160" width="600" height="160">
  <title>dirgha — wordmark, cream on ink</title>
  <rect width="600" height="160" fill="#0a0a0a"/>
  <!-- Macron above the i — one shade lighter than the cream so it reads as a deliberate diacritical -->
  <rect x="158" y="42" width="34" height="3" fill="#d4cfc8"/>
  <text x="300" y="116" font-family="Fraunces, Georgia, serif" font-size="112" font-weight="400" font-style="normal" letter-spacing="-0.02em" text-anchor="middle" fill="#f7f3ed">dīrgha</text>
</svg>
